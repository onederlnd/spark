{# app/templates/parent/join.html #}
{% extends "base.html" %}
{% block title %}Parent Join — SparK{% endblock %}

{% block content %}
<div style="max-width:420px; margin:4rem auto; padding:0 1rem;">
  <div class="card" style="padding:2rem;">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <div style="font-size:2rem;">👨‍👩‍👧</div>
      <h1 style="font-size:1.4rem; font-weight:900; margin:0.5rem 0 0.25rem;">Connect to Your Child</h1>
      <p style="color:var(--muted); font-size:0.88rem;">Enter the invite code from your child's teacher.</p>
    </div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.82rem; font-weight:800; margin-bottom:4px;">Invite Code</label>
        <input type="text" name="code" required autofocus
               placeholder="e.g. aB3xY7qZ"
               style="width:100%; padding:10px 12px; border-radius:var(--radius); border:1px solid var(--border); background:var(--soft); color:var(--text); font-family:monospace; font-size:1rem; letter-spacing:0.1em;">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Continue →</button>
    </form>
    <p style="text-align:center; margin-top:1.25rem; font-size:0.82rem; color:var(--muted);">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
