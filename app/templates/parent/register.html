{# app/templates/parent/register.html #}
{% extends "base.html" %}
{% block title %}Create Parent Account — SparK{% endblock %}

{% block content %}
<div style="max-width:420px; margin:4rem auto; padding:0 1rem;">
  <div class="card" style="padding:2rem;">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <div style="font-size:2rem;">✨</div>
      <h1 style="font-size:1.4rem; font-weight:900; margin:0.5rem 0 0.25rem;">Create Your Account</h1>
      <p style="color:var(--muted); font-size:0.88rem;">You'll be linked to your child once you sign up.</p>
    </div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:1rem;">
        <div>
          <label style="display:block; font-size:0.82rem; font-weight:800; margin-bottom:4px;">First Name</label>
          <input type="text" name="first_name" required autofocus
                 style="width:100%; padding:10px 12px; border-radius:var(--radius); border:1px solid var(--border); background:var(--soft); color:var(--text); font-size:0.9rem;">
        </div>
        <div>
          <label style="display:block; font-size:0.82rem; font-weight:800; margin-bottom:4px;">Last Name</label>
          <input type="text" name="last_name" required
                 style="width:100%; padding:10px 12px; border-radius:var(--radius); border:1px solid var(--border); background:var(--soft); color:var(--text); font-size:0.9rem;">
        </div>
      </div>
      <div style="margin-bottom:1.25rem;">
        <label style="display:block; font-size:0.82rem; font-weight:800; margin-bottom:4px;">Password</label>
        <input type="password" name="password" required minlength="8"
               placeholder="At least 8 characters"
               style="width:100%; padding:10px 12px; border-radius:var(--radius); border:1px solid var(--border); background:var(--soft); color:var(--text); font-size:0.9rem;">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account →</button>
    </form>
  </div>
</div>
{% endblock %}
