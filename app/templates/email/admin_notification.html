<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>New SparK Waitlist Signup</title>
</head>
<body style="margin:0; padding:0; background:#1a1f26; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#1a1f26; padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="580" cellpadding="0" cellspacing="0" style="background:#222831; border-radius:16px; overflow:hidden; border:1px solid #2e3744;">
          
          <tr>
            <td style="background:linear-gradient(135deg, #5ba3d9, #3ABCB1); padding:24px 32px;">
              <div style="color:#ffffff; font-size:1.2rem; font-weight:900;">⚡ SparK — New Waitlist Signup</div>
            </td>
          </tr>

          <tr>
            <td style="padding:32px 40px;">
              <h2 style="color:#dce6f0; font-size:1.1rem; font-weight:800; margin:0 0 20px;">Someone new joined the waitlist</h2>
              
              <div style="background:#1a1f26; border-radius:10px; padding:20px; border:1px solid #2e3744; margin-bottom:24px;">
                <div style="color:#7a92aa; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Email</div>
                <div style="color:#3ABCB1; font-size:1rem; font-weight:700;">{{ email }}</div>
              </div>

              <div style="background:#1a1f26; border-radius:10px; padding:20px; border:1px solid #2e3744;">
                <div style="color:#7a92aa; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Signed up at</div>
                <div style="color:#dce6f0; font-size:0.9rem;">{{ timestamp }}</div>
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 40px; border-top:1px solid #2e3744; text-align:center;">
              <p style="color:#7a92aa; font-size:0.75rem; margin:0;">© 2026 SparK LLC — Admin Notification</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
